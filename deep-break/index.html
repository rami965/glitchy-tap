<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deep Break — GlitchyTap</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .badge {
      font-size: 0.75rem;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    h1 { font-size: 3rem; letter-spacing: -1px; margin-bottom: 1rem; }
    .description { font-size: 1.1rem; color: #aaa; max-width: 480px; line-height: 1.6; margin-bottom: 2.5rem; }
    .cta {
      display: inline-block;
      background: #f0f0f0;
      color: #0f0f0f;
      font-weight: 600;
      padding: 0.85rem 2rem;
      border-radius: 999px;
      text-decoration: none;
      font-size: 1rem;
      transition: opacity 0.2s;
    }
    .cta:hover { opacity: 0.85; }
    .links { margin-top: 2rem; display: flex; gap: 1.5rem; justify-content: center; }
    .links a { font-size: 0.875rem; color: #666; text-decoration: none; }
    .links a:hover { color: #aaa; }
    footer { margin-top: 5rem; font-size: 0.75rem; color: #333; }
  </style>
</head>
<body>
  <p class="badge">GlitchyTap</p>
  <h1>Deep Break</h1>
  <p class="description">
    A single-player offline arcade game. No account. No internet. Just you and the game.
  </p>

  <a class="cta" href="#">Download on Google Play</a>

  <div class="links">
    <a href="privacy-policy/">Privacy Policy</a>
    <a href="../">All Games</a>
  </div>

  <footer>&copy; 2026 GlitchyTap. All rights reserved.</footer>
</body>
</html>
