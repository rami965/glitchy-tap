<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlitchyTap — Mobile Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 { font-size: 2.5rem; letter-spacing: -0.5px; margin-bottom: 0.5rem; }
    .tagline { color: #888; font-size: 1rem; margin-bottom: 3rem; }
    .games { display: flex; flex-wrap: wrap; gap: 1.5rem; justify-content: center; }
    .game-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 2rem;
      width: 260px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
    }
    .game-card:hover { border-color: #555; transform: translateY(-4px); }
    .game-card h2 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    .game-card p { font-size: 0.875rem; color: #888; }
    footer { margin-top: 4rem; font-size: 0.75rem; color: #444; }
  </style>
</head>
<body>
  <h1>GlitchyTap</h1>
  <p class="tagline">Mobile games built with passion</p>

  <div class="games">
    <a class="game-card" href="deep-break/">
      <h2>Deep Break</h2>
      <p>A single-player offline arcade experience</p>
    </a>
  </div>

  <footer>&copy; 2026 GlitchyTap. All rights reserved.</footer>
</body>
</html>
